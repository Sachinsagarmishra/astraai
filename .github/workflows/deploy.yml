name: VPS Auto Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: vps-auto-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Hostinger VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: /home/sachindesign-astrai/htdocs/astrai.sachindesign.com
          APP_NAME: astrai-backend
          APP_PORT: "3001"
          REPO_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_PORT: ${{ secrets.DB_PORT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: APP_DIR,APP_NAME,APP_PORT,REPO_URL,GEMINI_API_KEY,ADMIN_PASSWORD,DB_HOST,DB_USER,DB_PASSWORD,DB_NAME,DB_PORT
          command_timeout: 20m
          script: |
            set -Eeuo pipefail

            echo "Starting deployment on Hostinger VPS..."
            echo "Target directory: ${APP_DIR}"

            mkdir -p "${APP_DIR}"
            cd "${APP_DIR}"

            if [ ! -d .git ]; then
              if [ -n "$(find . -mindepth 1 -maxdepth 1 -not -name '.env' -print -quit)" ]; then
                echo "ERROR: ${APP_DIR} is not a Git checkout and is not empty."
                echo "Move existing files aside or clone ${REPO_URL} into this exact CloudPanel root once."
                exit 1
              fi

              echo "No Git checkout found. Cloning repository into CloudPanel root..."
              git clone "${REPO_URL}" .
            fi

            git remote set-url origin "${REPO_URL}"
            git fetch origin main
            git reset --hard
            git checkout main
            git reset --hard origin/main

            cat > .env <<EOF
            NODE_ENV=production
            PORT=${APP_PORT}
            GEMINI_API_KEY=${GEMINI_API_KEY}
            ADMIN_PASSWORD=${ADMIN_PASSWORD}
            DB_HOST=${DB_HOST}
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            DB_NAME=${DB_NAME}
            DB_PORT=${DB_PORT}
            EOF

            npm install --no-audit --no-fund
            npm run db:setup
            npm run build

            if command -v pm2 >/dev/null 2>&1; then
              pm2 delete "${APP_NAME}" || true
              NODE_ENV=production pm2 start npm --name "${APP_NAME}" --cwd "${APP_DIR}" -- start
              pm2 save
            else
              if [ -f app.pid ] && kill -0 "$(cat app.pid)" >/dev/null 2>&1; then
                kill "$(cat app.pid)"
                sleep 2
              fi

              nohup npm start > app.log 2>&1 < /dev/null &
              echo "$!" > app.pid
            fi

            sleep 3
            if ! curl --fail --silent --show-error "http://127.0.0.1:${APP_PORT}/" >/dev/null; then
              echo "Application health check failed. Recent app log:"
              tail -n 80 app.log || true
              exit 1
            fi

            echo "Deployment completed successfully!"
